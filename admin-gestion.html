<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI ADMIN | Gestion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="p-4">

    <h1 class="text-2xl font-black mb-6 text-emerald-500">ADMINISTRATION OMNI</h1>

    <section class="mb-10">
        <h2 class="text-lg font-bold mb-4 border-b border-emerald-500/30 pb-2 italic">🔔 Attente de Recharges (Dépôts)</h2>
        <div id="list-recharges"></div>
    </section>

    <section>
        <h2 class="text-lg font-bold mb-4 border-b border-red-500/30 pb-2 italic">💸 Attente de Retraits</h2>
        <div id="list-retraits"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION MISE À JOUR
        const firebaseConfig = { databaseURL: "https://omni-f2a9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GESTION DES RECHARGES (Chemin: deposits) ---
        onValue(ref(db, 'admin_requests/deposits'), (snapshot) => {
            const list = document.getElementById('list-recharges');
            list.innerHTML = "";
            if (!snapshot.exists()) {
                list.innerHTML = "<p class='text-gray-500 text-xs italic'>Aucun dépôt en attente.</p>";
                return;
            }
            snapshot.forEach((child) => {
                const req = child.val();
                const id = child.key;
                list.innerHTML += `
                    <div class="card">
                        <p class="text-emerald-400 font-bold text-lg">${req.montant.toLocaleString()} CDF</p>
                        <p class="text-xs text-gray-300">Pack: ${req.vip || 'N/A'}</p>
                        <p class="text-xs text-gray-400">Client: ${req.user}</p>
                        <p class="text-xs text-gray-400">Expéditeur: ${req.numeroExpediteur}</p>
                        <p class="text-xs text-yellow-500 font-mono mt-1">ID: ${req.transactionID}</p>
                        <div class="flex gap-2 mt-3">
                            <button onclick="validerRecharge('${id}', '${req.user}', ${req.montant})" class="bg-emerald-600 px-4 py-2 rounded text-xs font-bold uppercase">Valider ✅</button>
                            <button onclick="rejeterDemande('deposits', '${id}')" class="bg-red-900/50 px-4 py-2 rounded text-xs font-bold uppercase">Rejeter ❌</button>
                        </div>
                    </div>`;
            });
        });

        // --- FONCTION VALIDER RECHARGE ---
        window.validerRecharge = async (requestId, userPhone, montant) => {
            if(!confirm("Créditer " + montant + " CDF à " + userPhone + " ?")) return;
            
            const userSoldeRef = ref(db, `users/${userPhone}/solde`);
            
            try {
                await runTransaction(userSoldeRef, (currentSolde) => {
                    return (currentSolde || 0) + parseInt(montant);
                });
                // Supprimer la demande après validation
                await remove(ref(db, `admin_requests/deposits/${requestId}`));
                alert("Compte crédité avec succès !");
            } catch (e) {
                alert("Erreur: " + e.message);
            }
        };

        // --- GESTION DES RETRAITS ---
        onValue(ref(db, 'admin_requests/withdrawals'), (snapshot) => {
            const list = document.getElementById('list-retraits');
            list.innerHTML = "";
            if (!snapshot.exists()) {
                list.innerHTML = "<p class='text-gray-500 text-xs italic'>Aucun retrait en attente.</p>";
                return;
            }
            snapshot.forEach((child) => {
                const req = child.val();
                const id = child.key;
                list.innerHTML += `
                    <div class="card">
                        <p class="text-red-400 font-bold text-lg">${req.montant.toLocaleString()} CDF</p>
                        <p class="text-xs text-gray-300">Nom: ${req.nom}</p>
                        <p class="text-xs text-emerald-400 font-bold">Vers: ${req.numero}</p>
                        <p class="text-xs text-gray-500 italic mt-1">Compte client: ${req.user}</p>
                        <div class="flex gap-2 mt-3">
                            <button onclick="rejeterDemande('withdrawals', '${id}')" class="bg-blue-600 px-4 py-2 rounded text-xs font-bold uppercase">Confirmé & Payé ✅</button>
                            <button onclick="rejeterDemande('withdrawals', '${id}')" class="bg-red-900 px-4 py-2 rounded text-xs font-bold uppercase">Rejeter ❌</button>
                        </div>
                    </div>`;
            });
        });

        // --- FONCTION SUPPRIMER/REJETER ---
        window.rejeterDemande = (type, requestId) => {
            if(confirm("Confirmer la suppression de cette demande ?")) {
                remove(ref(db, `admin_requests/${type}/${requestId}`));
            }
        };
    </script>
</body>
</html>
