<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI ADMIN | Gestion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .btn-green { background: #10b981; color: white; padding: 0.5rem 1rem; rounded: 0.5rem; font-weight: bold; }
        .btn-red { background: #ef4444; color: white; padding: 0.5rem 1rem; rounded: 0.5rem; font-weight: bold; }
    </style>
</head>
<body class="p-4">

    <h1 class="text-2xl font-black mb-6 text-emerald-500">ADMINISTRATION OMNI</h1>

    <section class="mb-10">
        <h2 class="text-lg font-bold mb-4 border-b border-emerald-500/30 pb-2 italic">🔔 Attente de Recharges</h2>
        <div id="list-recharges"></div>
    </section>

    <section>
        <h2 class="text-lg font-bold mb-4 border-b border-red-500/30 pb-2 italic">💸 Attente de Retraits</h2>
        <div id="list-retraits"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://omni-vertus-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GESTION DES RECHARGES ---
        onValue(ref(db, 'admin_requests/recharges'), (snapshot) => {
            const list = document.getElementById('list-recharges');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const req = child.val();
                const id = child.key;
                list.innerHTML += `
                    <div class="card">
                        <p class="text-emerald-400 font-bold">${req.montant} FC</p>
                        <p class="text-xs text-gray-400">Utilisateur: ${req.user}</p>
                        <p class="text-xs text-gray-400">ID Transaction: ${req.transactionID}</p>
                        <div class="flex gap-2 mt-3">
                            <button onclick="validerRecharge('${id}', '${req.user}', ${req.montant})" class="bg-emerald-600 px-4 py-2 rounded text-xs font-bold">VALIDER ✅</button>
                            <button onclick="rejeterDemande('recharges', '${id}')" class="bg-gray-700 px-4 py-2 rounded text-xs font-bold">REJETER ❌</button>
                        </div>
                    </div>`;
            });
        });

        // --- FONCTION VALIDER RECHARGE ---
        window.validerRecharge = async (requestId, userPhone, montant) => {
            const userRef = ref(db, `users/${userPhone}/solde`);
            
            // On utilise une transaction pour éviter les erreurs de calcul
            runTransaction(userRef, (currentSolde) => {
                return (currentSolde || 0) + parseInt(montant);
            }).then(() => {
                // Supprimer la demande après validation
                remove(ref(db, `admin_requests/recharges/${requestId}`));
                alert("Compte crédité avec succès !");
            });
        };

        // --- GESTION DES RETRAITS ---
        onValue(ref(db, 'admin_requests/withdrawals'), (snapshot) => {
            const list = document.getElementById('list-retraits');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const req = child.val();
                const id = child.key;
                list.innerHTML += `
                    <div class="card">
                        <p class="text-red-400 font-bold">${req.montant} FC</p>
                        <p class="text-xs text-gray-400">Vers: ${req.numero}</p>
                        <p class="text-xs text-gray-400">Compte: ${req.user}</p>
                        <div class="flex gap-2 mt-3">
                            <button onclick="rejeterDemande('withdrawals', '${id}')" class="bg-blue-600 px-4 py-2 rounded text-xs font-bold">PAYÉ & SUPPRIMER ✅</button>
                            <button onclick="rejeterDemande('withdrawals', '${id}')" class="bg-red-900 px-4 py-2 rounded text-xs font-bold">REJETER ❌</button>
                        </div>
                    </div>`;
            });
        });

        // --- FONCTION SUPPRIMER/REJETER ---
        window.rejeterDemande = (type, requestId) => {
            if(confirm("Confirmer cette action ?")) {
                remove(ref(db, `admin_requests/${type}/${requestId}`));
            }
        };
    </script>
</body>
</html>
